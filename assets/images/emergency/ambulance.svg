<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="ambGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D32F2F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B71C1C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="640" height="480" fill="url(#ambGrad)"/>
  <!-- Ambulance vehicle -->
  <rect x="220" y="200" width="200" height="100" fill="#FFFFFF" rx="10"/>
  <circle cx="260" cy="300" r="30" fill="#333333"/>
  <circle cx="360" cy="300" r="30" fill="#333333"/>
  <!-- Medical cross -->
  <rect x="300" y="220" width="40" height="40" fill="#D32F2F"/>
  <rect x="310" y="230" width="8" height="20" fill="#FFFFFF"/>
  <rect x="305" y="233" width="20" height="8" fill="#FFFFFF"/>
  <!-- Siren light -->
  <circle cx="310" cy="180" r="20" fill="#FFD700" opacity="0.9"/>
  <circle cx="310" cy="180" r="30" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  <!-- Emergency stripes -->
  <rect x="225" y="210" width="10" height="70" fill="#FFD700" opacity="0.7"/>
  <rect x="245" y="210" width="10" height="70" fill="#FFD700" opacity="0.7"/>
  <text x="320" y="400" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Ambulance Service</text>
  <text x="320" y="435" font-size="16" fill="white" text-anchor="middle">Emergency Medical Response</text>
</svg>