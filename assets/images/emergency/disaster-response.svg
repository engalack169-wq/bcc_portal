<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="disasterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#455A64;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#263238;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="640" height="480" fill="url(#disasterGrad)"/>
  <!-- Rescue tent -->
  <polygon points="150,250 250,150 350,250" fill="#F44336" opacity="0.9"/>
  <rect x="150" y="250" width="200" height="120" fill="#D32F2F" opacity="0.8"/>
  <rect x="180" y="260" width="60" height="80" fill="#666666"/>
  <rect x="260" y="260" width="60" height="80" fill="#666666"/>
  <!-- Rescue personnel -->
  <circle cx="450" cy="180" r="28" fill="#FFDBAC"/>
  <rect x="432" y="215" width="36" height="80" fill="#FF6F00"/>
  <rect x="420" y="235" width="50" height="15" fill="#FFDBAC"/>
  <!-- Rescue ladder -->
  <rect x="500" y="150" width="15" height="150" fill="#8B4513"/>
  <g stroke="#D2B48C" stroke-width="3" fill="none">
    <line x1="510" y1="165" x2="525" y2="165"/>
    <line x1="510" y1="195" x2="525" y2="195"/>
    <line x1="510" y1="225" x2="525" y2="225"/>
    <line x1="510" y1="255" x2="525" y2="255"/>
  </g>
  <!-- Disaster elements -->
  <rect x="100" y="100" width="80" height="120" fill="#666666" opacity="0.7" transform="rotate(-25 140 160)"/>
  <text x="320" y="400" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Disaster Response</text>
  <text x="320" y="435" font-size="16" fill="white" text-anchor="middle">Emergency Recovery Operations</text>
</svg>