<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A5F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#skyGrad)"/>
  
  <!-- City silhouette -->
  <rect x="0" y="600" width="1920" height="480" fill="#0D1B2A" opacity="0.8"/>
  
  <!-- Buildings -->
  <rect x="50" y="500" width="200" height="580" fill="#1E3A5F"/>
  <rect x="300" y="450" width="180" height="630" fill="#16213E"/>
  <rect x="550" y="480" width="220" height="600" fill="#1E3A5F"/>
  <rect x="850" y="420" width="200" height="660" fill="#0F3460"/>
  <rect x="1150" y="500" width="180" height="580" fill="#16213E"/>
  <rect x="1400" y="460" width="240" height="620" fill="#1E3A5F"/>
  <rect x="1750" y="510" width="170" height="570" fill="#0F3460"/>
  
  <!-- Windows in buildings -->
  <g fill="#FFD700" opacity="0.7">
    <rect x="70" y="520" width="30" height="30"/><rect x="120" y="520" width="30" height="30"/><rect x="170" y="520" width="30" height="30"/>
    <rect x="70" y="590" width="30" height="30"/><rect x="120" y="590" width="30" height="30"/><rect x="170" y="590" width="30" height="30"/>
  </g>
  
  <!-- Text overlay -->
  <text x="960" y="540" font-size="72" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">
    Bamenda Cityscape
  </text>
  <text x="960" y="620" font-size="32" fill="white" text-anchor="middle" opacity="0.7">
    Hero Background - 1920x1080
  </text>
</svg>