<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="policeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="640" height="480" fill="url(#policeGrad)"/>
  <!-- Officer silhouette -->
  <circle cx="320" cy="120" r="35" fill="#FFDBAC"/>
  <rect x="295" y="165" width="50" height="100" fill="#333333"/>
  <rect x="280" y="165" width="20" height="120" fill="#333333"/>
  <rect x="360" y="165" width="20" height="120" fill="#333333"/>
  <!-- Badge -->
  <polygon points="320,180 335,190 335,210 320,220 305,210 305,190" fill="#FFD700"/>
  <circle cx="320" cy="200" r="5" fill="#0D47A1"/>
  <!-- Hat -->
  <ellipse cx="320" cy="85" rx="38" ry="15" fill="#222222"/>
  <rect x="315" y="75" width="10" height="10" fill="#FFD700"/>
  <!-- Arms -->
  <rect x="250" y="200" width="45" height="20" fill="#FFDBAC" rx="10"/>
  <rect x="345" y="200" width="45" height="20" fill="#FFDBAC" rx="10"/>
  <text x="320" y="400" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Police Service</text>
  <text x="320" y="435" font-size="16" fill="white" text-anchor="middle">Law Enforcement Protection</text>
</svg>