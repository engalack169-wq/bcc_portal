<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5722;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BF360C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="640" height="480" fill="url(#fireGrad)"/>
  <!-- Firefighter -->
  <circle cx="320" cy="110" r="32" fill="#FFDBAC"/>
  <rect x="298" y="150" width="44" height="90" fill="#C62828"/>
  <!-- Helmet -->
  <path d="M 305 70 Q 320 50 335 70 Q 335 85 320 90 Q 305 85 305 70" fill="#FFD700"/>
  <!-- Breathing apparatus -->
  <rect x="310" y="105" width="20" height="15" fill="#555555"/>
  <!-- Hose -->
  <path d="M 330 160 Q 360 170 380 180" stroke="#555555" stroke-width="8"/>
  <!-- Firefighter axes -->
  <g transform="translate(250, 250)">
    <rect x="0" y="0" width="10" height="60" fill="#8B4513"/>
    <polygon points="5,0 15,5 5,15 -5,5" fill="#999999"/>
  </g>
  <!-- Flames -->
  <path d="M 450 300 Q 460 250 450 200" fill="#FFD700" opacity="0.7"/>
  <path d="M 470 320 Q 480 260 470 200" fill="#FF8C00" opacity="0.7"/>
  <text x="320" y="400" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Fire & Rescue</text>
  <text x="320" y="435" font-size="16" fill="white" text-anchor="middle">Emergency Response Team</text>
</svg>