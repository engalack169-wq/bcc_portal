<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="emergencyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D32F2F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#emergencyGrad)"/>
  
  <!-- Ambulance -->
  <rect x="400" y="500" width="400" height="250" fill="#FFFFFF" rx="10"/>
  <circle cx="500" cy="650" r="50" fill="#333335"/>
  <circle cx="750" cy="650" r="50" fill="#333335"/>
  
  <!-- Medical cross on side -->
  <rect x="550" y="550" width="100" height="100" fill="#D32F2F" opacity="0.9"/>
  <rect x="585" y="575" width="30" height="50" fill="white"/>
  <rect x="560" y="600" width="80" height="30" fill="white"/>
  
  <!-- Siren on top -->
  <circle cx="600" cy="480" r="30" fill="#FFD700" opacity="0.9"/>
  <circle cx="600" cy="480" r="20" fill="#FF6F00"/>
  
  <!-- Flashing effect lines -->
  <circle cx="600" cy="480" r="50" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.6"/>
  <circle cx="600" cy="480" r="70" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.3"/>
  
  <!-- Medical cross symbol -->
  <g transform="translate(1200, 400)">
    <rect x="-80" y="-80" width="160" height="160" fill="#FFFFFF" rx="20" opacity="0.95"/>
    <rect x="-20" y="-60" width="40" height="120" fill="#D32F2F"/>
    <rect x="-60" y="-20" width="120" height="40" fill="#D32F2F"/>
  </g>
  
  <!-- Text -->
  <text x="960" y="250" font-size="68" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">
    Emergency Response
  </text>
  <text x="960" y="320" font-size="32" fill="white" text-anchor="middle" opacity="0.8">
    24/7 Emergency Services Ready
  </text>
</svg>