<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="communityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#communityGrad)"/>
  
  <!-- Conference table -->
  <ellipse cx="960" cy="600" rx="400" ry="150" fill="#8D6E63" opacity="0.9"/>
  
  <!-- People silhouettes around table -->
  <!-- Person 1 -->
  <circle cx="400" cy="450" r="35" fill="#FFDBAC"/>
  <rect x="375" y="490" width="50" height="120" fill="#1976D2"/>
  
  <!-- Person 2 -->
  <circle cx="600" cy="380" r="35" fill="#FFDBAC"/>
  <rect x="575" y="420" width="50" height="150" fill="#E91E63"/>
  
  <!-- Person 3 -->
  <circle cx="960" cy="360" r="40" fill="#FFDBAC"/>
  <rect x="930" y="410" width="60" height="170" fill="#1565C0"/>
  
  <!-- Person 4 -->
  <circle cx="1320" cy="380" r="35" fill="#FFB3BA"/>
  <rect x="1295" y="420" width="50" height="150" fill="#F57C00"/>
  
  <!-- Person 5 -->
  <circle cx="1520" cy="450" r="35" fill="#FFDBAC"/>
  <rect x="1495" y="490" width="50" height="120" fill="#7B1FA2"/>
  
  <!-- Text -->
  <text x="960" y="250" font-size="68" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">
    Community Dialogue
  </text>
  <text x="960" y="320" font-size="32" fill="white" text-anchor="middle" opacity="0.8">
    Unity Through Engagement
  </text>
</svg>