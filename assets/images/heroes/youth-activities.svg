<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="youthGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#youthGrad)"/>
  
  <!-- Sports elements -->
  <!-- Basketball -->
  <circle cx="400" cy="400" r="50" fill="none" stroke="#FF8C00" stroke-width="8"/>
  <line x1="350" y1="400" x2="450" y2="400" stroke="#FF8C00" stroke-width="4"/>
  <line x1="400" y1="350" x2="400" y2="450" stroke="#FF8C00" stroke-width="4"/>
  
  <!-- Soccer ball -->
  <circle cx="1500" cy="350" r="60" fill="#FFFFFF" opacity="0.9"/>
  <g stroke="#000" stroke-width="2" fill="none">
    <polygon points="1500,290 1530,310 1520,345 1485,360 1450,345 1440,310"/>
  </g>
  
  <!-- People doing activities -->
  <!-- Person 1 - jumping -->
  <circle cx="700" cy="300" r="35" fill="#FFDBAC"/>
  <rect x="675" y="350" width="50" height="80" fill="#1976D2"/>
  <rect x="650" y="280" width="100" height="15" fill="#FFD700" opacity="0.7"/>
  
  <!-- Person 2 - running -->
  <circle cx="1200" cy="320" r="35" fill="#FFDBAC"/>
  <rect x="1175" y="365" width="50" height="100" fill="#E91E63"/>
  <line x1="1150" y1="365" x2="1120" y2="320" stroke="#E91E63" stroke-width="15"/>
  
  <!-- Sun/Energy symbol -->
  <circle cx="1750" cy="200" r="80" fill="#FFD700" opacity="0.8"/>
  <g stroke="#FFD700" stroke-width="12" fill="none">
    <line x1="1750" y1="80" x2="1750" y2="40"/>
    <line x1="1750" y1="320" x2="1750" y2="360"/>
    <line x1="1870" y1="200" x2="1910" y2="200"/>
    <line x1="1630" y1="200" x2="1590" y2="200"/>
  </g>
  
  <!-- Text -->
  <text x="960" y="150" font-size="68" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">
    Youth Empowerment
  </text>
  <text x="960" y="220" font-size="32" fill="white" text-anchor="middle" opacity="0.8">
    Active, Engaged, Growing
  </text>
</svg>