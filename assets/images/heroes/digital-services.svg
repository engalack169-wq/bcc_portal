<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="digitalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#digitalGrad)"/>
  
  <!-- Laptop -->
  <rect x="600" y="350" width="720" height="480" rx="20" fill="#E8F5E9" stroke="#1B5E20" stroke-width="3"/>
  <rect x="550" y="820" width="820" height="40" fill="#424242"/>
  
  <!-- Screen content -->
  <rect x="630" y="380" width="660" height="400" fill="#F5F5F5"/>
  
  <!-- Dashboard elements -->
  <rect x="660" y="410" width="180" height="100" fill="#4CAF50" rx="5" opacity="0.8"/>
  <text x="750" y="465" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Dashboard</text>
  
  <rect x="900" y="410" width="180" height="100" fill="#2196F3" rx="5" opacity="0.8"/>
  <text x="990" y="465" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Services</text>
  
  <rect x="660" y="550" width="180" height="100" fill="#FF9800" rx="5" opacity="0.8"/>
  <text x="750" y="605" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Analytics</text>
  
  <rect x="900" y="550" width="180" height="100" fill="#F44336" rx="5" opacity="0.8"/>
  <text x="990" y="605" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Reports</text>
  
  <!-- Text overlay -->
  <text x="960" y="150" font-size="72" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">
    Digital Services
  </text>
  <text x="960" y="220" font-size="32" fill="white" text-anchor="middle" opacity="0.8">
    Connected Technology Platform
  </text>
</svg>