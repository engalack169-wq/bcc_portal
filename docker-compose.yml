version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bcc_portal_web
    ports:
      - "8080:80"
    environment:
      - DB_DRIVER=sqlite
      - DB_TYPE=sqlite
      - PHP_ENVIRONMENT=docker
      - LOG_CHANNEL=stderr
      - SESSION_DRIVER=file
      - ENVIRONMENT=development
      - DEBUG=true
    volumes:
      - ./:/var/www/html
      - ./data:/var/www/html/data
      - ./uploads:/var/www/html/uploads
      - ./logs:/var/www/html/logs
      - ./cache:/var/www/html/cache
      - ./sessions:/var/www/html/sessions
    networks:
      - bcc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  bcc_network:
    driver: bridge
