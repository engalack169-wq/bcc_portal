<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="officeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#officeGrad)"/>
  
  <!-- Building structure -->
  <rect x="400" y="200" width="1120" height="750" fill="#ECEFF1" stroke="#37474F" stroke-width="3"/>
  
  <!-- Roof -->
  <polygon points="400,200 960,50 1520,200" fill="#455A64"/>
  
  <!-- Entrance -->
  <rect x="900" y="650" width="120" height="300" fill="#263238"/>
  <rect x="920" y="670" width="40" height="80" fill="#FFD700"/>
  <rect x="980" y="670" width="40" height="80" fill="#FFD700"/>
  
  <!-- Windows -->
  <g fill="#81D4FA" opacity="0.8">
    <rect x="450" y="280" width="80" height="80"/><rect x="620" y="280" width="80" height="80"/><rect x="790" y="280" width="80" height="80"/><rect x="960" y="280" width="80" height="80"/><rect x="1130" y="280" width="80" height="80"/>
    <rect x="450" y="420" width="80" height="80"/><rect x="620" y="420" width="80" height="80"/><rect x="790" y="420" width="80" height="80"/><rect x="960" y="420" width="80" height="80"/><rect x="1130" y="420" width="80" height="80"/>
    <rect x="450" y="560" width="80" height="80"/><rect x="620" y="560" width="80" height="80"/><rect x="790" y="560" width="80" height="80"/><rect x="1130" y="560" width="80" height="80"/>
  </g>
  
  <!-- Flag pole -->
  <rect x="950" y="30" width="20" height="40" fill="#8D6E63"/>
  <polygon points="970,35 970,55 1020,45" fill="#004D27"/>
  
  <!-- Text -->
  <text x="960" y="980" font-size="64" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">
    Government Office
  </text>
  <text x="960" y="1040" font-size="28" fill="white" text-anchor="middle" opacity="0.7">
    Administrative Building
  </text>
</svg>